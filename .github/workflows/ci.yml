name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      # Gate on high+ only: moderate advisories in framework-pinned transitive
      # deps (e.g. postcss via next) have no non-breaking fix and would make
      # the pipeline permanently red.
      - name: Audit dependencies (high and above)
        run: npm audit --audit-level=high

      - name: Production build
        run: npm run build